<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Family Devotional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f1f38;
    --navy-mid: #1a3254;
    --navy-light: #243d66;
    --gold: #c8954a;
    --gold-light: #e8b96a;
    --gold-pale: #f5e6c8;
    --parchment: #faf5eb;
    --parchment-dark: #f0e6cc;
    --ink: #1a1208;
    --ink-mid: #3a2e1a;
    --red-accent: #8b1a1a;
    --cream: #fdf8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    min-height: 100vh;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(200,149,74,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,50,84,0.9) 0%, var(--navy) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 36px 20px 24px;
    border-bottom: 1px solid rgba(200,149,74,0.3);
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 700;
    color: var(--parchment);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .app-title span { color: var(--gold-light); font-style: italic; }

  .subtitle {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    color: rgba(245,230,200,0.6);
    font-style: italic;
  }

  .ornament { color: var(--gold); font-size: 16px; margin: 0 6px; opacity: 0.7; }

  /* ── LANGUAGE TOGGLE ── */
  .lang-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 18px auto 0;
    width: fit-content;
    border: 1px solid rgba(200,149,74,0.4);
    border-radius: 4px;
    overflow: hidden;
  }

  .lang-btn {
    padding: 8px 22px;
    background: transparent;
    border: none;
    color: rgba(245,230,200,0.5);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .lang-btn.active {
    background: var(--gold);
    color: var(--navy);
    font-weight: 600;
  }

  .lang-btn:hover:not(.active) {
    background: rgba(200,149,74,0.1);
    color: var(--gold);
  }

  .lang-divider {
    width: 1px;
    height: 36px;
    background: rgba(200,149,74,0.4);
  }

  /* ── CONTAINER ── */
  .container {
    position: relative;
    z-index: 2;
    max-width: 820px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .date-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gold);
    opacity: 0.8;
  }

  .date-bar::before, .date-bar::after {
    content: '';
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,149,74,0.5));
  }
  .date-bar::after { background: linear-gradient(to left, transparent, rgba(200,149,74,0.5)); }

  /* ── GENERATE BUTTON ── */
  .btn-generate {
    display: block;
    width: 100%;
    max-width: 460px;
    margin: 0 auto 36px;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    background-size: 200% 200%;
    color: var(--navy);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: 600;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 24px rgba(200,149,74,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
  }

  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .btn-generate:hover::before { transform: translateX(100%); }
  .btn-generate:hover { box-shadow: 0 6px 32px rgba(200,149,74,0.5); transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── LOADING ── */
  .loading { display: none; text-align: center; padding: 60px 20px; }
  .loading.show { display: block; }

  .cross-spinner {
    font-size: 36px;
    animation: pulse-cross 1.5s ease-in-out infinite;
    color: var(--gold);
    display: block;
    margin-bottom: 18px;
  }

  @keyframes pulse-cross {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .loading p {
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--gold-pale);
    opacity: 0.8;
  }

  /* ── DEVOTIONAL CARD ── */
  .devotional-card {
    display: none;
    background: var(--parchment);
    border-radius: 2px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,149,74,0.3);
    overflow: hidden;
    animation: fadeInUp 0.6s ease forwards;
  }

  .devotional-card.show { display: block; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
    padding: 30px 36px;
    position: relative;
    overflow: hidden;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }

  .card-date {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 700;
    color: var(--parchment);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .card-reference {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--gold-light);
    opacity: 0.85;
  }

  .section {
    padding: 26px 36px;
    border-bottom: 1px solid rgba(139,106,60,0.15);
    animation: sectionReveal 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes sectionReveal { to { opacity: 1; } }

  .section:last-of-type { border-bottom: none; }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--red-accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(139,26,26,0.3), transparent);
  }

  .scripture-block {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: 2px;
    padding: 24px 28px;
    margin: -10px 0 0;
    position: relative;
  }

  .scripture-block::before {
    content: '\201C';
    position: absolute;
    top: 8px; left: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    color: var(--gold);
    opacity: 0.2;
    line-height: 1;
  }

  .scripture-text {
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    line-height: 1.85;
    color: var(--parchment);
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  .scripture-ref {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-top: 12px;
    display: block;
    text-align: right;
  }

  .section p {
    font-size: 17px;
    line-height: 1.85;
    color: var(--ink-mid);
    margin-bottom: 12px;
  }

  .section p:last-child { margin-bottom: 0; }
  .section strong { color: var(--navy); font-weight: 600; }
  .section em { font-style: italic; }

  .question-list { list-style: none; }

  .question-list li {
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink-mid);
    padding: 10px 0 10px 32px;
    border-bottom: 1px dashed rgba(139,106,60,0.2);
    position: relative;
  }

  .question-list li:last-child { border-bottom: none; }

  .question-list li::before {
    content: attr(data-num);
    position: absolute;
    left: 0; top: 10px;
    width: 22px; height: 22px;
    background: var(--navy);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .prayer-block {
    background: linear-gradient(135deg, rgba(15,31,56,0.06) 0%, rgba(200,149,74,0.06) 100%);
    border-left: 4px solid var(--gold);
    border-radius: 0 2px 2px 0;
    padding: 20px 24px;
    font-style: italic;
    font-size: 17px;
    line-height: 1.85;
    color: var(--ink-mid);
  }

  .card-footer {
    background: var(--navy);
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .footer-motto {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(245,230,200,0.5);
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    background: transparent;
    border: 1px solid rgba(200,149,74,0.5);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }

  .btn-copy:hover { background: rgba(200,149,74,0.1); border-color: var(--gold); }
  .btn-copy.copied { color: #4caf8a; border-color: #4caf8a; }

  .error-box {
    display: none;
    background: rgba(139,26,26,0.15);
    border: 1px solid rgba(139,26,26,0.4);
    border-radius: 2px;
    padding: 18px 24px;
    color: #e8a0a0;
    font-size: 15px;
    text-align: center;
    margin-bottom: 20px;
  }
  .error-box.show { display: block; }

  @media (max-width: 600px) {
    .card-header, .section, .card-footer { padding-left: 20px; padding-right: 20px; }
    .scripture-block { padding: 18px 20px; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1 class="app-title"><span>Daily</span> Family Devotional</h1>
  <p class="subtitle"><span class="ornament">✦</span> Scripture-Saturated · Christ-Exalting · Reformed <span class="ornament">✦</span></p>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnEN" onclick="setLang('en')">🇺🇸 &nbsp;EN</button>
    <div class="lang-divider"></div>
    <button class="lang-btn" id="btnES" onclick="setLang('es')">🇪🇸 &nbsp;ES</button>
  </div>
</header>

<div class="container">
  <div class="date-bar" id="datebar"></div>

  <button class="btn-generate" id="genBtn" onclick="generateDevo()">
    ✦ &nbsp; <span id="btnLabel">GENERATE TODAY'S DEVOTIONAL</span> &nbsp; ✦
  </button>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <span class="cross-spinner">✝</span>
    <p id="loadingMsg">Preparing today's devotional from God's Word…</p>
  </div>

  <div class="devotional-card" id="devoCard">
    <div class="card-header">
      <p class="card-date" id="cardDate"></p>
      <h2 class="card-title" id="cardTitle"></h2>
      <p class="card-reference" id="cardRef"></p>
    </div>
    <div class="card-body" id="cardBody"></div>
    <div class="card-footer">
      <span class="footer-motto" id="footerMotto"></span>
      <button class="btn-copy" id="copyBtn" onclick="copyDevo()">⧉ &nbsp; <span id="copyLabel">COPY TEXT</span></button>
    </div>
  </div>
</div>

<script>
let currentLang = 'en';
let devoText = '';


const UI = {
  en: {
    btnLabel: "GENERATE TODAY'S DEVOTIONAL",
    loadingMsg: "Preparing today's devotional from God's Word…",
    copyLabel: "COPY TEXT",
    copied: "✓  COPIED!",
    errorMsg: "⚠ Could not generate devotional. Please try again.",
    footerMotto: '"The Lord of hosts is with us; the God of Jacob is our fortress."',
    readAloud: "📖 Read the passage aloud together as a family first.",
    sections: {
      scripture: "📜 Scripture Passage",
      context: "🏛️ Historical & Cultural Context",
      explanation: "📖 Reading & Explanation",
      gospel: "✝️ Gospel Focus",
      application: "🏡 Family Application",
      questions: "💬 Family Discussion Questions",
      prayer: "🙏 Closing Prayer",
      closing: "✦   NOW GATHER · READ · PRAY · DISCUSS   ✦"
    }
  },
  es: {
    btnLabel: "GENERAR DEVOCIONAL DE HOY",
    loadingMsg: "Preparando el devocional de hoy de la Palabra de Dios…",
    copyLabel: "COPIAR TEXTO",
    copied: "✓  ¡COPIADO!",
    errorMsg: "⚠ No se pudo generar el devocional. Por favor intente de nuevo.",
    footerMotto: '"El Señor de los ejércitos está con nosotros; el Dios de Jacob es nuestro refugio."',
    readAloud: "📖 Lean el pasaje en voz alta juntos como familia primero.",
    sections: {
      scripture: "📜 Pasaje Bíblico",
      context: "🏛️ Contexto Histórico y Cultural",
      explanation: "📖 Lectura y Explicación",
      gospel: "✝️ Enfoque del Evangelio",
      application: "🏡 Aplicación Familiar",
      questions: "💬 Preguntas para Discusión Familiar",
      prayer: "🙏 Oración de Cierre",
      closing: "✦   REÚNANSE · LEAN · OREN · DISCUTAN   ✦"
    }
  }
};

const SYSTEM_EN = `You are a faithful Reformed devotional writer for family worship time, aligned with the teaching of John MacArthur (clear exposition, doctrinal accuracy, practical holiness), John Piper (God's supremacy, joy in Him, treasuring Christ), and R.C. Sproul (God's sovereignty, holiness, grace-centered truth). Your devotionals are Scripture-saturated, Christ-exalting, theologically sound, and suitable for families with children, teens, and adults. Always root everything in God's grace through Christ—avoid moralism.

To ensure variety, always choose a fresh, diverse passage: alternate between Old Testament and New Testament. Never repeat the same book or similar theme consecutively.

Respond ONLY with a valid JSON object (no markdown, no backticks, no preamble):
{
  "title": "Short, engaging, God-honoring title",
  "reference": "Book Chapter:Verses (ESV)",
  "scripture": "Full ESV text of the passage",
  "context": "50-100 word historical/cultural context",
  "explanation": "150-250 word reading and explanation (HTML allowed: <strong>, <em>)",
  "gospel": "50-100 word gospel focus",
  "application": ["Application point 1", "Application point 2", "Application point 3"],
  "questions": [
    {"tag": "Young kids", "q": "Question for young children"},
    {"tag": "All ages", "q": "Question for the whole family"},
    {"tag": "Teens/Adults", "q": "Deeper question"},
    {"tag": "All ages", "q": "Practical question"},
    {"tag": "Deep", "q": "Theological question"}
  ],
  "prayer": "50-100 word closing family prayer"
}`;

const SYSTEM_ES = `Eres un escritor devocional reformado fiel para el tiempo de adoración familiar, alineado con las enseñanzas de Juan MacArthur (exposición clara, precisión doctrinal, santidad práctica), John Piper (la supremacía de Dios, gozo en Él, atesorar a Cristo) y R.C. Sproul (soberanía de Dios, santidad, verdad centrada en la gracia). Tus devocionales están saturados de las Escrituras, exaltan a Cristo, son teológicamente sólidos y adecuados para familias con niños, adolescentes y adultos. Siempre fundamenta todo en la gracia de Dios a través de Cristo—evita el moralismo.

Para garantizar variedad, siempre elige un pasaje fresco y diverso: alterna entre el Antiguo Testamento y el Nuevo Testamento. Nunca repitas el mismo libro o tema similar consecutivamente.

Responde ÚNICAMENTE con un objeto JSON válido (sin markdown, sin backticks, sin preámbulo):
{
  "title": "Título corto, atractivo y que honre a Dios",
  "reference": "Libro Capítulo:Versículos (RVR1960)",
  "scripture": "Texto completo en español (RVR1960)",
  "context": "Contexto histórico/cultural de 50-100 palabras",
  "explanation": "Lectura y explicación de 150-250 palabras (HTML permitido: <strong>, <em>)",
  "gospel": "Enfoque del evangelio de 50-100 palabras",
  "application": ["Punto de aplicación 1", "Punto de aplicación 2", "Punto de aplicación 3"],
  "questions": [
    {"tag": "Niños pequeños", "q": "Pregunta para niños pequeños"},
    {"tag": "Todas las edades", "q": "Pregunta para toda la familia"},
    {"tag": "Jóvenes/Adultos", "q": "Pregunta más profunda"},
    {"tag": "Todas las edades", "q": "Pregunta práctica"},
    {"tag": "Profunda", "q": "Pregunta teológica"}
  ],
  "prayer": "Oración familiar de cierre de 50-100 palabras"
}`;

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.getElementById('btnES').classList.toggle('active', lang === 'es');
  const u = UI[lang];
  document.getElementById('btnLabel').textContent = u.btnLabel;
  document.getElementById('loadingMsg').textContent = u.loadingMsg;
  document.getElementById('copyLabel').textContent = u.copyLabel;
  // Update date format
  setDateBar();
  // If a devotional is showing, clear it so user generates fresh in new lang
  document.getElementById('devoCard').classList.remove('show');
  devoText = '';
}

function setDateBar() {
  const today = new Date();
  const locale = currentLang === 'es' ? 'es-ES' : 'en-US';
  const dateStr = today.toLocaleDateString(locale, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('datebar').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
  return dateStr;
}

async function generateDevo() {
  const btn = document.getElementById('genBtn');
  const loading = document.getElementById('loading');
  const card = document.getElementById('devoCard');
  const errorBox = document.getElementById('errorBox');
  const u = UI[currentLang];

  btn.disabled = true;
  document.getElementById('btnLabel').textContent = currentLang === 'en' ? 'GENERATING…' : 'GENERANDO…';
  loading.classList.add('show');
  card.classList.remove('show');
  errorBox.classList.remove('show');

  const dateStr = setDateBar();
  const userPrompt = currentLang === 'en'
    ? `Today is ${dateStr}. Generate a complete family devotional for today. Choose a passage not used recently — pick from a diverse range of Bible books. Return only the JSON object.`
    : `Hoy es ${dateStr}. Genera un devocional familiar completo para hoy. Elige un pasaje que no se haya usado recientemente — selecciona de una variedad de libros bíblicos. Devuelve solo el objeto JSON.`;

  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: currentLang === 'en' ? SYSTEM_EN : SYSTEM_ES,
        userMessage: userPrompt
      })
    });

    const data = await res.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const devo = JSON.parse(clean);

    renderDevo(devo, dateStr);
    devoText = buildPlainText(devo, dateStr);
    card.classList.add('show');

    document.querySelectorAll('.section').forEach((el, i) => {
      el.style.animationDelay = `${i * 0.08}s`;
    });

  } catch (err) {
    errorBox.textContent = u.errorMsg;
    errorBox.classList.add('show');
    console.error(err);
  } finally {
    loading.classList.remove('show');
    btn.disabled = false;
    document.getElementById('btnLabel').textContent = u.btnLabel;
  }
}

function renderDevo(d, dateStr) {
  const u = UI[currentLang];
  const s = u.sections;

  document.getElementById('cardDate').textContent = dateStr.toUpperCase();
  document.getElementById('cardTitle').textContent = `"${d.title}"`;
  document.getElementById('cardRef').textContent = d.reference;
  document.getElementById('footerMotto').textContent = u.footerMotto;

  document.getElementById('cardBody').innerHTML = `
    <div class="scripture-block">
      <p class="scripture-text">${d.scripture}</p>
      <span class="scripture-ref">— ${d.reference}</span>
    </div>

    <div class="section" style="background:#f7f2e8;">
      <div class="section-label">${s.context}</div>
      <p>${d.context}</p>
    </div>

    <div class="section">
      <div class="section-label">${s.explanation}</div>
      <p><em>${u.readAloud}</em></p>
      <p>${d.explanation}</p>
    </div>

    <div class="section" style="background:#f2f6fa;">
      <div class="section-label">${s.gospel}</div>
      <p>${d.gospel}</p>
    </div>

    <div class="section">
      <div class="section-label">${s.application}</div>
      ${d.application.map((a, i) => `<p>${['🕊','🏡','✝'][i] || '•'} <strong>${a.split(' ').slice(0,3).join(' ')}</strong> ${a.split(' ').slice(3).join(' ')}</p>`).join('')}
    </div>

    <div class="section" style="background:#f7f2e8;">
      <div class="section-label">${s.questions}</div>
      <ul class="question-list">
        ${d.questions.map((q, i) => `<li data-num="${i+1}"><span style="font-family:'Cinzel',serif;font-size:10px;color:#8b1a1a;letter-spacing:1px;">[${q.tag}]</span> ${q.q}</li>`).join('')}
      </ul>
    </div>

    <div class="section">
      <div class="section-label">${s.prayer}</div>
      <div class="prayer-block">${d.prayer}</div>
      <p style="text-align:center;margin-top:18px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#8b1a1a;opacity:0.8;">${s.closing}</p>
    </div>
  `;
}

async function copyDevo() {
  if (!devoText) return;
  try {
    await navigator.clipboard.writeText(devoText);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    document.getElementById('copyLabel').textContent = UI[currentLang].copied;
    setTimeout(() => {
      btn.classList.remove('copied');
      document.getElementById('copyLabel').textContent = UI[currentLang].copyLabel;
    }, 2500);
  } catch(e) {}
}

setDateBar();
